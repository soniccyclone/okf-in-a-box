name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      semver:
        description: The semver to use
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          set -e
          bump-my-version bump ${{ github.event.inputs.semver }}

      - name: Capture new version
        run: echo "NEW_VERSION=$(bump-my-version show current_version)" >> $GITHUB_ENV

      - name: Commit and push changes
        run: |
          git add pyproject.toml
          git commit -m "Release v${{ env.NEW_VERSION }}"
          git tag "v${{ env.NEW_VERSION }}"
          git push origin master
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          draft: false
          prerelease: false

      - name: Publish to PyPI (Trusted Publishing)
        id: pypi_publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Check publish result
        if: steps.pypi_publish.outcome == 'failure'
        run: |
          echo "::warning::PyPI publication failed. OIDC Trusted Publishing may not be configured for this repository."
          exit 0
